name: CI Build Check
on:
push:
branches: [ "main" ]
jobs:
build:
run-on: windows-latest
steps:
-uses: actions/checkout@v3
-name: Setup .NET
uses: actions/setup-dotnet@v3
with:
dotnet-version: '6.0.x'
-name: Restore dependencies
run: dotnet restore
-name: Build project
run: dotnet build  --no-restore
